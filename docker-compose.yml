services:
  redis:
    image: redis:7-alpine
    container_name: banksimple-redis
    ports:
      - "6380:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres-client:
    image: postgres:16
    restart: unless-stopped
    container_name: banksimple-postgres-client
    environment:
      POSTGRES_USER: banksimple
      POSTGRES_PASSWORD: banksimple
      POSTGRES_DB: banksimple_clients
    ports:
      - "5432:5432"
    volumes:
      - pgdata-client:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banksimple -d banksimple_clients"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres-account:
    image: postgres:16
    restart: unless-stopped
    container_name: banksimple-postgres-account
    environment:
      POSTGRES_USER: banksimple
      POSTGRES_PASSWORD: banksimple
      POSTGRES_DB: banksimple_accounts
    ports:
      - "5433:5432"
    volumes:
      - pgdata-account:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banksimple -d banksimple_accounts"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres-payment:
    image: postgres:16
    restart: unless-stopped
    container_name: banksimple-postgres-payment
    environment:
      POSTGRES_USER: banksimple
      POSTGRES_PASSWORD: banksimple
      POSTGRES_DB: banksimple_payments
    ports:
      - "5434:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banksimple -d banksimple_payments"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: banksimple-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@banksimple.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres-client
      - postgres-account
      - postgres-payment

  client-service:
    build:
      context: .
      dockerfile: src/services/ClientService/Dockerfile
    deploy:
      replicas: 4
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres-client;Port=5432;Database=banksimple_clients;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      postgres-client:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  account-service:
    build:
      context: .
      dockerfile: src/services/AccountService/Dockerfile
    deploy:
      replicas: 4
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres-account;Port=5432;Database=banksimple_accounts;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      postgres-account:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  payment-service:
    build:
      context: .
      dockerfile: src/services/PaymentService/Dockerfile
    deploy:
      replicas: 4
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres-payment;Port=5432;Database=banksimple_payments;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
      AccountService__BaseUrl: "http://account-service:8080"
      Kafka__BrokerUrl: "kafka:29092"
      Kafka__GroupId: "banksimple-payment"
      Kafka__BankId: "4"
      Bbc__BaseUrl: "http://bbc-service:5005"
      Bbc__BankId: "4"
    networks:
      - default
      - bbc-network
    depends_on:
      postgres-payment:
        condition: service_healthy
      account-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: banksimple-nginx
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client-service
      - account-service
      - payment-service

  kong:
    image: kong:3.6-ubuntu
    container_name: banksimple-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8090:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    container_name: banksimple-prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - client-service
      - account-service
      - payment-service

  grafana:
    image: grafana/grafana:latest
    container_name: banksimple-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  bbc-network:
    external: true

volumes:
  pgdata-client:
  pgdata-account:
  pgdata-payment:
  grafana_data:
