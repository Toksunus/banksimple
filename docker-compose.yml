services:
  redis:
    image: redis:7-alpine
    container_name: banksimple-redis
    ports:
      - "6379:6379"
    # Désactiver la persistance pour les tests, container redemarre cache vide
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    restart: unless-stopped
    container_name: banksimple-postgres
    environment:
      POSTGRES_USER: banksimple
      POSTGRES_PASSWORD: banksimple
      POSTGRES_DB: banksimple
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banksimple -d banksimple"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: banksimple-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@banksimple.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  client-service:
    build:
      context: .
      dockerfile: src/services/ClientService/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=banksimple_clients;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  account-service:
    build:
      context: .
      dockerfile: src/services/AccountService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=banksimple_accounts;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  payment-service:
    build:
      context: .
      dockerfile: src/services/PaymentService/Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=banksimple_payments;Username=banksimple;Password=banksimple"
      Jwt__Secret: "BankSimple2026SuperSecretJwtKey!!"
      Jwt__Issuer: "BankSimple"
      Jwt__Audience: "BankSimpleClients"
      Jwt__ExpirationHours: "4"
      Redis__ConnectionString: "redis:6379"
      AccountService__BaseUrl: "http://account-service:8080"
    depends_on:
      account-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' && echo ok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: banksimple-nginx
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client-service
      - account-service
      - payment-service

  kong:
    image: kong:3.6-ubuntu
    container_name: banksimple-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8090:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    container_name: banksimple-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - client-service
      - account-service
      - payment-service

  grafana:
    image: grafana/grafana:latest
    container_name: banksimple-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana_data:
