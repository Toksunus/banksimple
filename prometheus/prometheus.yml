global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'client-service'
    static_configs:
      - targets: ['client-service:8080']
    scrape_interval: 5s

  - job_name: 'account-service'
    static_configs:
      - targets: ['account-service:8080']
    scrape_interval: 5s

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8080']
    scrape_interval: 5s

  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']
    scrape_interval: 5s
